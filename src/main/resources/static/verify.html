<div class="auth-card card">
    <div class="auth-logo">PayloadWatch.</div>
    <h2>Verify your email</h2>
    <p class="text-muted">Enter the 6-digit code sent to your inbox.</p>

    <form id="verifyForm">
        <div class="form-group">
            <input type="text" id="verificationCode" placeholder="000000" required maxlength="6" style="text-align: center; letter-spacing: 8px; font-size: 24px;">

        <button type="submit" class="btn btn-primary" style="width: 100%;">Confirm Account</button>
    </form>
</div>
<script src="verify.js"></script>
