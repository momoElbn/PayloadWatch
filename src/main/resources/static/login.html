<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayloadWatch | Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">

<div style="position: absolute; top: 24px; right: 24px;">
    <select id="loginThemeSelect" style="padding: 6px 30px 6px 12px; font-size: 12px;">
        <option value="light">Light Mode</option>
        <option value="dark">Dark Mode</option>
    </select>
</div>

<div class="auth-wrapper">
    <div class="auth-card card">
        <div class="auth-logo">PayloadWatch.</div>
        <h2 style="margin-bottom: 8px; font-size: 20px;">Welcome back</h2>
        <p class="text-muted text-sm" style="margin-bottom: 24px;">Sign in to your account to monitor your APIs.</p>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" required placeholder="you@company.com">
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <div class="flex-between">
                    <label class="form-label mb-0" for="password">Password</label>
<!--                    <a href="#" class="text-sm" style="color: var(&#45;&#45;primary-green); font-weight: 500;">Forgot password?</a>-->
                </div>
                <input type="password" id="password" required placeholder="••••••••" style="margin-top: 6px;">
            </div>

            <button type="submit" class="btn btn-primary" id="loginBtn" style="width: 100%; padding: 12px; font-size: 15px;">Sign In</button>
        </form>

        <p class="text-center text-sm text-muted" style="margin-top: 24px;">
            Don't have an account? <a href="signup.html" style="color: var(--text-primary); font-weight: 600;">Sign Up</a>
        </p>
    </div>
</div>

<script src="login.js"></script>
</body>
</html>
