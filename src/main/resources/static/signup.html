<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayloadWatch | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">

<div style="position: absolute; top: 24px; right: 24px;">
    <select id="signupThemeSelect" style="padding: 6px 30px 6px 12px; font-size: 12px;">
        <option value="light">Light Mode</option>
        <option value="dark">Dark Mode</option>
    </select>
</div>

<div class="auth-wrapper">
    <div class="auth-card card">
        <div class="auth-logo">PayloadWatch.</div>
        <h2 style="margin-bottom: 8px; font-size: 20px;">Create an account</h2>
        <p class="text-muted text-sm" style="margin-bottom: 24px;">Start monitoring your APIs in seconds.</p>

        <form id="signupForm">
            <div class="form-group">
                <label class="form-label" for="signupEmail">Email Address</label>
                <input type="email" id="signupEmail" required placeholder="you@company.com">
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label class="form-label mb-0" for="signupPassword">Password</label>
                <input type="password" id="signupPassword" required placeholder="••••••••" style="margin-top: 6px;">
                <small class="text-muted" style="font-size: 12px; display: block; margin-top: 6px;">Must be at least 8 characters and contain a special character.</small>
            </div>

            <button type="submit" class="btn btn-primary" id="signupBtn" style="width: 100%; padding: 12px; font-size: 15px;">Sign Up</button>
        </form>

        <p class="text-center text-sm text-muted" style="margin-top: 24px;">
            Already have an account? <a href="login.html" style="color: var(--primary-green); font-weight: 600;">Sign In</a>
        </p>
    </div>
</div>

<script src="signup.js"></script>
</body>
</html>
