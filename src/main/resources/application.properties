spring.application.name=PayloadWatch

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5433/payloadwatch_local
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Unable Docker
spring.docker.compose.enabled=false

# Active Profile
spring.profiles.active=local

# Include Error Messages in API Responses
spring.web.error.include-message=always

# JWT Authentication Config
# Use an environment variable for production, default provided for local dev
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000