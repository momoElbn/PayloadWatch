spring.application.name=PayloadWatch

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5433/payloadwatch_local
spring.datasource.username=
spring.datasource.password=

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Unable Docker
spring.docker.compose.enabled=false

# Active Profile
spring.profiles.active=local

# AWS Cognito Frontend Config
aws.cognito.client-id=${COGNITO_CLIENT_ID:}
aws.cognito.region=${AWS_REGION:ca-central-1}
