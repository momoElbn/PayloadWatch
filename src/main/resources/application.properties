spring.application.name=PayloadWatch

# Database Connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Unable Docker
spring.docker.compose.enabled=false

# Active Profile
spring.profiles.active=local

# Never Include Error Messages in API Responses
spring.web.error.include-message=never

# JWT Authentication Config
# Use an environment variable for production, default provided for local dev
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS Configuration
app.cors.allowed-origins=http://127.0.0.1:5500,http://localhost:5500,http://localhost:8080