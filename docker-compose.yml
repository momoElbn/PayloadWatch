services:
  app:
    build: . # Tells Docker to look for your Dockerfile in this directory
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # These environment variables override your application.properties!
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${COGNITO_ISSUER_URI}
      - AWS_COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - AWS_COGNITO_REGION=${AWS_REGION}
    depends_on:
      - db

  db:
    image: postgres:17
    env_file:
      - .env
    ports:
      - "5433:5432" # local -> container
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
